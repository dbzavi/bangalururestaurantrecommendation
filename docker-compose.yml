version: '3.8'

services:
  db:
    image: postgres:15
    container_name: zomato_db
    environment:
      POSTGRES_USER: zomato_user
      POSTGRES_PASSWORD: zomato_password
      POSTGRES_DB: zomato
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
