            backdrop-filter: blur(12px);

            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);

        .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .glass-input:focus {
            outline: none;
            border-color: #E23744;
            box-shadow: 0 0 0 2px rgba(226, 55, 68, 0.2);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;

        ::-webkit-scrollbar-thumb:hover {

                <div class="flex flex-col gap-1.5">

                    <div class="flex items-center gap-3">
                        <input type="range" id="budget" min="200" max="5000" step="100" value="2000" class="w-full accent-accent" oninput="document.getElementById('budget-val').innerText = '₹' + this.value"/>

                    </div>
                </div>

                    <label class="text-gray-400 font-medium">⭐ Minimum Rating</label>
                    <div class="flex items-center gap-3">
                        <input type="range" id="rating" min="0" max="5" step="0.1" value="4.0" class="w-full accent-accent" oninput="document.getElementById('rating-val').innerText = this.value"/>

                    </div>
                </div>

                    <label class="text-gray-400 font-medium">🍽️ Cuisines</label>
                    <input type="text" id="cuisines" placeholder="e.g. Italian, Chinese" class="glass-input p-3 rounded-xl transition-all"/>
                </div>

                <div class="flex flex-col gap-1.5 pt-2 border-t border-white/10 mt-2">
                    <label class="text-accent font-semibold flex items-center gap-1.5">✨ AI Preferences</label>
                    <p class="text-xs text-gray-400 mb-1">Tell the AI exactly what vibe you're looking for.</p>
                    <textarea id="ai-prefs" placeholder="e.g. Looking for a quiet, romantic spot." class="glass-input p-3 rounded-xl transition-all resize-none h-24"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="mt-4 p-4 rounded-xl font-bold text-white shadow-lg transition-all bg-accent hover:bg-red-600 hover:shadow-accent/30 hover:-translate-y-0.5">
                    ✨ Generate Recommendations
                </button>
            </form>
        </div>

        <!-- Right Area - Results -->
        <div id="results-area" class="flex-grow w-full">
            <div class="w-full h-64 flex flex-col items-center justify-center text-gray-500 glass-panel rounded-3xl border-dashed border-2 border-white/10">
                <p class="text-lg">Tell us what you're craving on the left!</p>
            </div>
        </div>

    </div>

    <script>
        const form = document.getElementById('search-form');
        const resultsArea = document.getElementById('results-area');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const location = document.getElementById('location').value;
            const budget = parseInt(document.getElementById('budget').value) || 2000;
            const rating = parseFloat(document.getElementById('rating').value) || 0.0;
            const cuisines = document.getElementById('cuisines').value.split(',').map(c => c.trim()).filter(c => c !== '');
            const additional_preferences = document.getElementById('ai-prefs').value;

            const payload = {
                location,
                budget_max: budget,
                cuisines: cuisines,
                min_rating: rating,
                additional_preferences
            };

            // Set loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('bg-accent/50', 'cursor-not-allowed');
            submitBtn.classList.remove('hover:bg-red-600', 'hover:-translate-y-0.5');
            submitBtn.innerHTML = `Consulting AI...`;

            resultsArea.innerHTML = `
                <div class="w-full h-64 flex flex-col items-center justify-center gap-4 text-accent animate-pulse">
                    <div class="w-12 h-12 border-4 border-accent/30 border-t-accent rounded-full animate-spin"></div>
                    <p class="font-semibold text-lg tracking-wide">AI is analyzing top candidates...</p>
                </div>
            `;

            try {
                // Automatically switch between local development and production Railway URL
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const baseUrl = isLocal 
                    ? 'http://localhost:8000' 
                    : 'https://YOUR-RAILWAY-APP-URL.up.railway.app'; // <--- PASTE YOUR RAILWAY URL HERE!
                
                const response = await axios.post(`${baseUrl}/api/recommend`, payload);
                const results = response.data;

                if (results.length === 0) {
                    resultsArea.innerHTML = `
                        <div class="w-full h-64 flex flex-col items-center justify-center text-gray-500 glass-panel rounded-3xl border-dashed">
                            <p class="text-lg">No restaurants found matching your criteria.</p>
                        </div>
                    `;
                } else {
                    let html = '<div class="grid grid-cols-1 xl:grid-cols-2 gap-6 w-full">';
                    results.forEach(r => {
                        html += `
                            <div class="glass-panel rounded-2xl overflow-hidden group transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-accent/10 border border-white/5 relative flex flex-col h-full">
                                <div class="p-5 flex justify-between items-start gap-4 pb-3 relative z-10">
                                    <div>
                                        <h3 class="text-xl font-bold text-white mb-1 group-hover:text-accent transition-colors">
                                            ${r.name}
                                        </h3>
                                        <p class="text-gray-400 text-sm flex items-center gap-1">📍 ${r.location}</p>
                                    </div>
                                    ${r.ai_rank ? `<div class="absolute top-0 right-0 bg-accent text-white font-black text-xl w-14 h-14 flex items-center justify-center rounded-bl-3xl shadow-lg shadow-accent/20">#${r.ai_rank}</div>` : ''}
                                </div>

                                <div class="px-5 flex flex-wrap gap-2 mb-4 relative z-10">
                                    <span class="bg-white/10 text-white text-xs px-2.5 py-1 rounded-full flex items-center gap-1 font-medium border border-white/10 backdrop-blur-sm">⭐ ${r.rate} (${r.votes})</span>
                                    <span class="bg-white/10 text-white text-xs px-2.5 py-1 rounded-full flex items-center gap-1 font-medium border border-white/10 backdrop-blur-sm">💰 ₹${r.cost_for_two} for two</span>
                                </div>

                                <div class="px-5 mb-5 relative z-10 flex-grow">
                                    <div class="flex items-start gap-2 text-sm text-gray-300">
                                        🍽️ <p class="capitalize leading-relaxed">${r.cuisines}</p>
                                    </div>
                                </div>

                                ${r.ai_explanation ? `
                                <div class="mx-5 mb-5 p-4 rounded-xl bg-accent/10 border border-accent/20 relative z-10">
                                    <div class="flex items-center gap-1.5 mb-2 text-accent font-semibold text-xs uppercase tracking-wider">
                                        ✨ AI Insight
                                    </div>
                                    <p class="text-sm text-gray-200 leading-relaxed italic">"${r.ai_explanation}"</p>
                                </div>` : ''}

                                ${r.zomato_url ? `
                                <div class="mt-auto px-5 pb-5">
                                    <a href="${r.zomato_url}" target="_blank" class="w-full flex items-center justify-center gap-2 py-3 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl transition-colors font-medium text-sm">
                                        View on Zomato ↗
                                    </a>
                                </div>` : ''}
                            </div>
                        `;
                    });
                    html += '</div>';
                    resultsArea.innerHTML = html;
                }
            } catch (err) {
                console.error(err);
                const errorMsg = err.response?.data?.detail || err.message || 'An error occurred';
                resultsArea.innerHTML = `
                    <div class="glass-panel border-red-500/30 bg-red-500/10 text-white p-4 rounded-xl mb-6">
                        <p class="font-semibold text-red-400">Error</p>
                        <p class="text-sm">${errorMsg}</p>
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-accent/50', 'cursor-not-allowed');
                submitBtn.classList.add('hover:bg-red-600', 'hover:-translate-y-0.5');
                submitBtn.innerHTML = `✨ Generate Recommendations`;
            }
        });
    </script>
